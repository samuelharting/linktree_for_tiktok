    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --canvas: #f1eee6;
        --paper: #fbfaf6;
        --ink: #17191a;
        --muted: #6d6d69;
        --line: #cbc7bc;
        --indigo: #28343e;
        --focus: #70635b;
        --serif: "Instrument Serif", Georgia, serif;
        --sans: "Manrope", system-ui, sans-serif;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        min-height: 100svh;
        color: var(--ink);
        background-color: var(--canvas);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.52;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(23, 25, 26, 0.055) 0 0.5px, transparent 0.75px),
          radial-gradient(circle at 70% 60%, rgba(40, 52, 62, 0.045) 0 0.45px, transparent 0.7px),
          radial-gradient(circle at 40% 80%, rgba(23, 25, 26, 0.035) 0 0.35px, transparent 0.6px);
        background-size: 5px 5px, 7px 7px, 11px 11px;
      }

      body.modal-open {
        overflow: hidden;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      button {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .skip-link {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 100;
        padding: 9px 13px;
        color: var(--paper);
        background: var(--indigo);
        transform: translateY(-160%);
        transition: transform 180ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .page {
        width: min(100% - 40px, 1080px);
        min-height: 100vh;
        min-height: 100svh;
        margin-inline: auto;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .top-rule,
      .bottom-rule {
        height: 25px;
        border-color: var(--line);
      }

      .top-rule {
        border-bottom: 1px solid var(--line);
      }

      .bottom-rule {
        border-top: 1px solid var(--line);
      }

      main {
        width: 100%;
        align-self: center;
        padding-block: clamp(44px, 7vh, 76px);
      }

      .brand-row {
        position: relative;
        isolation: isolate;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 30px;
        margin-bottom: clamp(30px, 5vw, 48px);
      }

      .brand-row::before {
        content: "";
        position: absolute;
        z-index: -2;
        top: -34%;
        right: 5%;
        width: min(48vw, 510px);
        height: 138%;
        background: rgba(40, 52, 62, 0.1);
        border-radius: 56% 44% 63% 37% / 41% 58% 42% 59%;
        filter: blur(0.35px);
        transform: rotate(-4deg);
      }

      .brand-row::after {
        content: "";
        position: absolute;
        z-index: -1;
        right: 14%;
        bottom: 4%;
        width: 48%;
        height: 24px;
        background: rgba(23, 25, 26, 0.075);
        clip-path: polygon(0 34%, 8% 16%, 21% 23%, 34% 8%, 53% 18%, 68% 4%, 84% 19%, 100% 11%, 97% 78%, 82% 70%, 64% 88%, 47% 72%, 28% 91%, 10% 76%);
        transform: rotate(-2deg);
      }

      h1 {
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(4.8rem, 12vw, 8.8rem);
        font-weight: 500;
        letter-spacing: -0.065em;
        line-height: 0.78;
      }

      .seal {
        width: 42px;
        height: 42px;
        display: grid;
        flex: 0 0 auto;
        place-items: center;
        margin-bottom: 4px;
        color: var(--paper);
        background: var(--indigo);
        border: 1px solid var(--indigo);
        font-family: var(--sans);
        font-size: 0.76rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        line-height: 1;
        transform: rotate(-2deg);
      }

      .destination-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .destination-card {
        position: relative;
        width: 100%;
        min-height: 238px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 20px;
        padding: 24px;
        color: var(--ink);
        background: rgba(251, 250, 246, 0.68);
        border: 1px solid var(--line);
        appearance: none;
        text-align: left;
        text-decoration: none;
        cursor: pointer;
        overflow: hidden;
        transition:
          color 280ms var(--ease),
          background-color 280ms var(--ease),
          transform 280ms var(--ease);
      }

      .destination-card + .destination-card {
        border-left: 1px solid var(--line);
      }

      .destination-card > * {
        position: relative;
        z-index: 1;
      }

      .destination-card::before {
        content: "";
        position: absolute;
        z-index: 0;
        top: 31%;
        left: 18%;
        width: 74%;
        height: 34%;
        background: rgba(40, 52, 62, 0.085);
        clip-path: polygon(0 28%, 9% 15%, 25% 23%, 42% 5%, 61% 17%, 78% 8%, 100% 21%, 96% 77%, 79% 68%, 60% 89%, 39% 74%, 19% 91%, 3% 73%);
        transform: rotate(-5deg);
        transition:
          background-color 280ms var(--ease),
          transform 420ms var(--ease);
      }

      .destination-card:nth-child(2)::before {
        top: 13%;
        left: 55%;
        width: 30%;
        height: 72%;
        background: rgba(23, 25, 26, 0.06);
        clip-path: polygon(18% 0, 81% 5%, 100% 17%, 87% 39%, 96% 63%, 73% 100%, 24% 93%, 0 76%, 12% 52%, 3% 27%);
        transform: rotate(8deg);
      }

      .destination-card:nth-child(3)::before {
        top: 58%;
        left: 7%;
        width: 86%;
        height: 20%;
        background: rgba(40, 52, 62, 0.095);
        transform: rotate(-3deg);
      }

      .destination-card::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        border-right: 1px solid currentColor;
        border-bottom: 1px solid currentColor;
        opacity: 0;
        transition:
          opacity 280ms var(--ease),
          transform 280ms var(--ease);
      }

      .destination-card:hover {
        color: var(--paper);
        background: var(--indigo);
        transform: translateY(-3px);
      }

      .destination-card:hover::before {
        background: rgba(251, 250, 246, 0.1);
        transform: rotate(-2deg) scale(1.03);
      }

      .destination-card:nth-child(2):hover::before {
        transform: rotate(5deg) scale(1.03);
      }

      .destination-card:hover::after {
        opacity: 0.55;
        transform: translate(-10px, -10px);
      }

      .card-top,
      .card-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .card-number {
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.16em;
        transition: color 280ms var(--ease);
      }

      .destination-card:hover .card-number {
        color: rgba(255, 253, 248, 0.65);
      }

      .card-icon {
        font-size: 1.08rem;
      }

      .card-title {
        align-self: end;
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(1.75rem, 3vw, 2.3rem);
        font-weight: 500;
        letter-spacing: -0.035em;
        line-height: 1;
      }

      .card-arrow {
        font-size: 1.05rem;
        transition: transform 280ms var(--ease);
      }

      .destination-card:hover .card-arrow {
        transform: translate(3px, -3px);
      }

      .social-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding-top: 24px;
      }

      .social-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.2em;
      }

      .social-links {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .social-link {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        color: var(--ink);
        border: 1px solid transparent;
        font-size: 1rem;
        text-decoration: none;
        transition:
          color 220ms ease,
          border-color 220ms ease,
          background-color 220ms ease,
          transform 280ms var(--ease);
      }

      .social-link:hover {
        color: var(--paper);
        background: var(--indigo);
        border-color: var(--indigo);
        transform: translateY(-2px);
      }

      a:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 4px;
      }

      dialog {
        width: min(94vw, 1080px);
        max-height: 88vh;
        max-height: 88svh;
        padding: 0;
        color: var(--ink);
        background: var(--canvas);
        border: 1px solid var(--ink);
        border-radius: 2px;
        box-shadow: 0 24px 64px rgba(23, 25, 26, 0.17);
      }

      dialog::backdrop {
        background: rgba(23, 25, 26, 0.44);
        backdrop-filter: blur(2px);
      }

      dialog[open] {
        animation: dialog-in 320ms var(--ease) both;
      }

      .dialog-shell {
        max-height: 88vh;
        max-height: 88svh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .dialog-header,
      .dialog-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 20px 24px;
      }

      .dialog-header {
        border-bottom: 1px solid var(--line);
      }

      .dialog-footer {
        border-top: 1px solid var(--line);
      }

      .dialog-title {
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(1.7rem, 4vw, 2.4rem);
        font-weight: 500;
        letter-spacing: -0.035em;
      }

      .close-button {
        width: 40px;
        height: 40px;
        display: grid;
        flex: 0 0 auto;
        place-items: center;
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--line);
        cursor: pointer;
        font-family: var(--sans);
        font-size: 1.3rem;
        line-height: 1;
        transition:
          color 220ms ease,
          border-color 220ms ease,
          transform 280ms var(--ease);
      }

      .close-button:hover {
        color: var(--paper);
        background: var(--indigo);
        border-color: var(--indigo);
        transform: rotate(4deg);
      }

      .dialog-body {
        min-height: 0;
        overflow: auto;
        padding: 24px;
      }

      .journal-frame {
        padding: 10px;
        background: var(--paper);
        border: 1px solid var(--line);
        clip-path: polygon(0.15% 0, 99.8% 0.25%, 100% 99.65%, 0.1% 100%);
      }

      .journal-frame img {
        width: 100%;
        height: auto;
        display: block;
      }

      .dialog-link {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.07em;
        text-decoration: none;
        text-transform: uppercase;
        transition:
          color 220ms ease,
          transform 280ms var(--ease);
      }

      .dialog-link:hover {
        color: var(--indigo);
        transform: translateX(3px);
      }

      .indicator-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .indicator-item {
        display: grid;
        grid-template-rows: auto 1fr;
        color: var(--ink);
        background: var(--paper);
        border: 1px solid var(--line);
        text-decoration: none;
        transition:
          border-color 220ms ease,
          transform 280ms var(--ease),
          box-shadow 280ms var(--ease);
      }

      .indicator-item:hover {
        border-color: var(--indigo);
        box-shadow: 0 12px 24px rgba(53, 65, 75, 0.09);
        transform: translateY(-3px);
      }

      .indicator-image-wrap {
        aspect-ratio: 16 / 10;
        overflow: hidden;
        background: #e9e4da;
        border-bottom: 1px solid var(--line);
      }

      .indicator-image-wrap img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transition: transform 500ms var(--ease);
      }

      .indicator-item:hover img {
        transform: scale(1.025);
      }

      .indicator-info {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: end;
        gap: 16px;
        padding: 17px;
      }

      .indicator-name {
        font-family: var(--serif);
        font-size: 1rem;
        font-weight: 500;
        line-height: 1.5;
      }

      .indicator-info span:last-child {
        color: var(--muted);
        transition: transform 280ms var(--ease);
      }

      .indicator-item:hover .indicator-info span:last-child {
        transform: translate(2px, -2px);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .reveal {
        opacity: 0;
        animation: reveal 620ms var(--ease) forwards;
        animation-delay: var(--delay, 0ms);
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(7px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes dialog-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 28px, 1080px);
        }

        main {
          padding-block: 38px;
        }

        .brand-row {
          margin-bottom: 30px;
        }

        h1 {
          font-size: clamp(4rem, 21vw, 6.2rem);
        }

        .seal {
          width: 36px;
          height: 36px;
        }

        .destination-grid {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .destination-card {
          min-height: 102px;
          grid-template-columns: auto 1fr auto;
          grid-template-rows: 1fr;
          align-items: center;
          gap: 18px;
          padding: 18px 16px;
        }

        .destination-card + .destination-card {
          border-left: 1px solid var(--line);
        }

        .card-top,
        .card-bottom {
          display: contents;
        }

        .card-number {
          grid-column: 1;
          grid-row: 1;
        }

        .card-icon {
          display: none;
        }

        .card-title {
          grid-column: 2;
          grid-row: 1;
          align-self: center;
          font-size: 1.75rem;
        }

        .card-arrow {
          grid-column: 3;
          grid-row: 1;
        }

        .social-row {
          padding-top: 18px;
        }

        .social-label {
          font-size: 0.62rem;
        }

        .social-links {
          gap: 1px;
        }

        .social-link {
          width: 39px;
          height: 39px;
        }

        dialog {
          width: min(96vw, 1080px);
          max-height: 91svh;
        }

        .dialog-shell {
          max-height: 91svh;
        }

        .dialog-header,
        .dialog-footer {
          padding: 16px;
        }

        .dialog-body {
          padding: 14px;
        }

        .indicator-grid {
          grid-template-columns: 1fr;
        }

        .indicator-item {
          grid-template-columns: minmax(112px, 38%) 1fr;
          grid-template-rows: 1fr;
        }

        .indicator-image-wrap {
          height: 100%;
          min-height: 128px;
          aspect-ratio: auto;
          border-right: 1px solid var(--line);
          border-bottom: 0;
        }

        .indicator-info {
          align-items: center;
          padding: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }

        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>

  <body>
    <a class="skip-link" href="#main-content">Skip to links</a>

    <div class="page">
      <div class="top-rule reveal" style="--delay: 40ms" aria-hidden="true"></div>

      <main id="main-content">
        <div class="brand-row reveal" style="--delay: 90ms">
          <h1>Bandz.</h1>
          <span class="seal" aria-hidden="true">B</span>
        </div>

        <nav class="destination-grid reveal" style="--delay: 150ms" aria-label="Bandz links">
          <a
            class="destination-card"
            href="https://discord.gg/XdWaEBXQ6G"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="card-top">
              <span class="card-number">01</span>
              <i class="card-icon fa-brands fa-discord" aria-hidden="true"></i>
            </span>
            <span aria-hidden="true"></span>
            <span class="card-bottom">
              <span class="card-title">Discord</span>
              <span class="card-arrow" aria-hidden="true">↗</span>
            </span>
          </a>

          <button
            class="destination-card"
            type="button"
            id="openJournal"
            aria-haspopup="dialog"
            aria-controls="journalDialog"
          >
            <span class="card-top">
              <span class="card-number">02</span>
              <i class="card-icon fa-regular fa-bookmark" aria-hidden="true"></i>
            </span>
            <span aria-hidden="true"></span>
            <span class="card-bottom">
              <span class="card-title">Journal</span>
              <span class="card-arrow" aria-hidden="true">↗</span>
            </span>
          </button>

          <button
            class="destination-card"
            type="button"
            id="openIndicators"
            aria-haspopup="dialog"
            aria-controls="indicatorsDialog"
          >
            <span class="card-top">
              <span class="card-number">03</span>
              <i class="card-icon fa-solid fa-chart-simple" aria-hidden="true"></i>
            </span>
            <span aria-hidden="true"></span>
            <span class="card-bottom">
              <span class="card-title">Indicators</span>
              <span class="card-arrow" aria-hidden="true">↗</span>
            </span>
          </button>
        </nav>

        <section class="social-row reveal" style="--delay: 220ms" aria-labelledby="social-title">
          <h2 class="social-label" id="social-title">SOCIALS</h2>
          <nav class="social-links" aria-label="Bandz social media">
            <a
              class="social-link"
              href="https://x.com/Band_with_sam"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Bandz on X"
              title="X"
            >
              <i class="fa-brands fa-twitter" aria-hidden="true"></i>
            </a>
            <a
              class="social-link"
              href="https://www.instagram.com/bandwithsam/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Bandz on Instagram"
              title="Instagram"
            >
              <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            </a>
            <a
              class="social-link"
              href="https://www.tiktok.com/@bandwithsam"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Bandz on TikTok"
              title="TikTok"
            >
              <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
            </a>
            <a
              class="social-link"
              href="https://youtube.com/@BandWithSam"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Bandz on YouTube"
              title="YouTube"
            >
              <i class="fa-brands fa-youtube" aria-hidden="true"></i>
            </a>
          </nav>
        </section>
      </main>

      <div class="bottom-rule reveal" style="--delay: 270ms" aria-hidden="true"></div>
    </div>

    <dialog id="journalDialog" aria-labelledby="journalTitle">
      <div class="dialog-shell">
        <header class="dialog-header">
          <h2 class="dialog-title" id="journalTitle">Journal</h2>
          <button class="close-button" type="button" data-close-dialog aria-label="Close journal">
            <span aria-hidden="true">×</span>
          </button>
        </header>
        <div class="dialog-body">
          <div class="journal-frame">
            <img
              src="calender.png"
              alt="Bandz Journal yearly overview with month-by-month trading results"
              width="3840"
              height="2063"
              loading="lazy"
              decoding="async"
            />
          </div>

    <script>
      const journalDialog = document.querySelector("#journalDialog");
      const indicatorsDialog = document.querySelector("#indicatorsDialog");
      const dialogBindings = [
        [document.querySelector("#openJournal"), journalDialog],
        [document.querySelector("#openIndicators"), indicatorsDialog],
      ];

      function openDialog(dialog) {
        if (!dialog.open) {
          dialog.showModal();
        }
        document.body.classList.add("modal-open");
      }

      function closeDialog(dialog) {
        dialog.close();
        document.body.classList.remove("modal-open");
      }

      dialogBindings.forEach(([trigger, dialog]) => {
        trigger.addEventListener("click", () => openDialog(dialog));

        dialog.querySelector("[data-close-dialog]").addEventListener("click", () => {
          closeDialog(dialog);
        });

        dialog.addEventListener("click", (event) => {
          if (event.target === dialog) {
            closeDialog(dialog);
          }
        });

        dialog.addEventListener("close", () => {
          document.body.classList.remove("modal-open");
        });
      });
    </script>
