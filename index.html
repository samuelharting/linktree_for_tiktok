<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Bandz. | Discord, Journal &amp; Indicators</title>
    <meta
      name="description"
      content="Free Discord, a free trading journal, free TradingView indicators, and Bandz socials."
    />
    <meta name="theme-color" content="#f1eee6" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://all-bandz-links.vercel.app/" />
    <meta property="og:title" content="Bandz." />
    <meta property="og:description" content="Discord · Journal · Indicators · Socials" />
    <meta property="og:image" content="https://all-bandz-links.vercel.app/og.png" />
    <meta property="og:image:alt" content="Bandz. Discord, Journal, Indicators, and Socials." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bandz." />
    <meta name="twitter:description" content="Discord · Journal · Indicators · Socials" />
    <meta name="twitter:image" content="https://all-bandz-links.vercel.app/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      :root {
        color-scheme: light;
        --canvas: #f1eee6;
        --paper: #fbfaf6;
        --ink: #17191a;
        --muted: #6d6d69;
        --line: #c9c4b8;
        --navy: #28343e;
        --plum: #59465f;
        --plum-dark: #443349;
        --focus: #75615e;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        min-height: 100svh;
        color: var(--ink);
        background-color: var(--canvas);
        background-image:
          radial-gradient(circle at 13% 17%, rgba(255, 255, 255, 0.6), transparent 30%),
          radial-gradient(circle at 86% 82%, rgba(40, 52, 62, 0.055), transparent 33%),
          repeating-linear-gradient(8deg, rgba(23, 25, 26, 0.012) 0 1px, transparent 1px 5px);
        font-family: "Manrope", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.32;
        background-image:
          radial-gradient(circle at 20% 30%, rgba(23, 25, 26, 0.08) 0 0.5px, transparent 0.7px),
          radial-gradient(circle at 70% 60%, rgba(23, 25, 26, 0.06) 0 0.5px, transparent 0.7px);
        background-size: 7px 7px, 11px 11px;
      }

      body.modal-open {
        overflow: hidden;
      }

      button,
      a {
        font: inherit;
        -webkit-tap-highlight-color: transparent;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .skip-link {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 100;
        padding: 10px 14px;
        color: var(--paper);
        background: var(--ink);
        text-decoration: none;
        transform: translateY(-160%);
        transition: transform 180ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .page {
        width: min(1120px, calc(100% - 48px));
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(24px, 4vw, 54px) 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(22px, 3vw, 38px);
      }

      .rule {
        height: 1px;
        background: var(--ink);
        opacity: 0.78;
        transform-origin: left;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(360px, 1.08fr) minmax(390px, 0.92fr);
        align-items: center;
        gap: clamp(44px, 7vw, 92px);
      }

      .portrait-column {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .portrait-frame {
        width: min(92%, 480px);
        aspect-ratio: 1;
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid rgba(23, 25, 26, 0.56);
        border-radius: 50%;
        background: #ded5c6;
        box-shadow: 0 24px 70px rgba(23, 25, 26, 0.13);
        position: relative;
        z-index: 1;
      }

      .portrait-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 25%;
        filter: saturate(0.88) contrast(1.03);
      }

      .panel {
        min-width: 0;
      }

      .main-links {
        display: grid;
        gap: 12px;
      }

      .link-row {
        appearance: none;
        width: 100%;
        min-height: 108px;
        padding: 0;
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr) 42px;
        align-items: stretch;
        color: var(--ink);
        background: rgba(251, 250, 246, 0.8);
        border: 1px solid var(--line);
        border-radius: 2px;
        cursor: pointer;
        overflow: hidden;
        text-align: left;
        text-decoration: none;
        transition:
          transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1),
          border-color 280ms ease,
          background-color 280ms ease,
          box-shadow 280ms ease;
      }

      .link-row:hover {
        transform: translateX(5px);
        border-color: rgba(23, 25, 26, 0.56);
        background: var(--paper);
        box-shadow: -10px 12px 28px rgba(23, 25, 26, 0.07);
      }

      .link-row:focus-visible,
      .social-link:focus-visible,
      .close-button:focus-visible,
      .indicator-item:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 4px;
      }

      .link-preview {
        min-width: 0;
        overflow: hidden;
        background: #d7d4cc;
        border-right: 1px solid var(--line);
      }

      .link-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.72) contrast(1.02);
        transition: transform 500ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .link-row:hover .link-preview img {
        transform: scale(1.045);
      }

      .link-preview--discord {
        display: grid;
        place-items: center;
        color: #f8f5ee;
        background: var(--plum);
        border-right-color: var(--plum-dark);
      }

      .link-preview--discord i {
        font-size: 37px;
      }

      .link-preview--journal img {
        object-position: 50% 45%;
      }

      .link-preview--indicator img {
        object-position: 52% 50%;
      }

      .link-copy {
        min-width: 0;
        padding: 20px 18px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
      }

      .link-kicker {
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .link-title {
        font-family: "Instrument Serif", Georgia, serif;
        font-size: clamp(26px, 2.7vw, 34px);
        font-weight: 400;
        line-height: 1;
        letter-spacing: -0.025em;
      }

      .link-arrow {
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 18px;
        transition: color 240ms ease, transform 240ms ease;
      }

      .link-row:hover .link-arrow {
        color: var(--ink);
        transform: translate(2px, -2px);
      }

      .socials {
        margin-top: clamp(22px, 3vw, 34px);
        padding-top: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        border-top: 1px solid var(--line);
      }

      .social-label {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .social-links {
        display: flex;
        gap: 8px;
      }

      .social-link {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 50%;
        background: rgba(251, 250, 246, 0.45);
        text-decoration: none;
        transition: color 220ms ease, background-color 220ms ease, transform 220ms ease;
      }

      .social-link i {
        font-size: 20px;
      }

      .social-link:hover {
        color: var(--paper);
        background: var(--ink);
        transform: translateY(-3px);
      }

      dialog {
        width: min(1040px, calc(100% - 32px));
        max-height: min(760px, calc(100svh - 32px));
        padding: 0;
        color: var(--ink);
        background: var(--paper);
        border: 1px solid var(--ink);
        border-radius: 2px;
        box-shadow: 0 30px 100px rgba(23, 25, 26, 0.28);
      }

      dialog::backdrop {
        background: rgba(24, 26, 27, 0.58);
        backdrop-filter: blur(5px);
      }

      .dialog-shell {
        max-height: inherit;
        overflow: auto;
      }

      .dialog-header {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 20px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        background: rgba(251, 250, 246, 0.95);
        border-bottom: 1px solid var(--line);
      }

      .dialog-title {
        margin: 0;
        font-family: "Instrument Serif", Georgia, serif;
        font-size: clamp(38px, 5vw, 58px);
        font-weight: 400;
        line-height: 0.9;
      }

      .close-button {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 50%;
        cursor: pointer;
        font-size: 26px;
        line-height: 1;
      }

      .close-button:hover {
        color: var(--paper);
        background: var(--ink);
      }

      .dialog-body {
        padding: 22px;
      }

      .indicator-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .indicator-item {
        min-width: 0;
        color: var(--ink);
        border: 1px solid var(--line);
        background: #f6f3ec;
        text-decoration: none;
        transition: transform 220ms ease, border-color 220ms ease;
      }

      .indicator-item:hover {
        transform: translateY(-4px);
        border-color: var(--ink);
      }

      .indicator-image-wrap {
        display: block;
        aspect-ratio: 932 / 550;
        overflow: hidden;
        background: var(--navy);
      }

      .indicator-image-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.78);
      }

      .indicator-info {
        min-height: 78px;
        padding: 14px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .indicator-name {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.45;
      }

      .reveal {
        animation: reveal 700ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        animation-delay: var(--delay, 0ms);
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 860px) {
        .page {
          width: min(640px, calc(100% - 36px));
          padding: 24px 0 30px;
        }

        .layout {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .portrait-frame {
          width: min(72vw, 420px);
        }

      }

      @media (max-width: 560px) {
        .page {
          width: min(100% - 28px, 440px);
          gap: 22px;
        }

        .layout {
          gap: 20px;
        }

        .portrait-frame {
          width: min(78vw, 330px);
        }

        .link-row {
          min-height: 96px;
          grid-template-columns: 94px minmax(0, 1fr) 34px;
        }

        .link-copy {
          padding: 15px 14px;
        }

        .link-title {
          font-size: clamp(24px, 7.4vw, 30px);
        }

        .socials {
          align-items: flex-start;
          flex-direction: column;
          gap: 12px;
        }

        .social-links {
          width: 100%;
          justify-content: space-between;
        }

        .social-link {
          width: 52px;
          height: 52px;
        }

        .indicator-grid {
          grid-template-columns: 1fr;
        }

        .dialog-body {
          padding: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }

        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>

  <body>
    <a class="skip-link" href="#main-content">Skip to links</a>

    <div class="page">
      <div class="rule reveal" style="--delay: 40ms" aria-hidden="true"></div>

      <main class="layout" id="main-content">
        <div class="portrait-column reveal" style="--delay: 90ms">
          <figure class="portrait-frame">
            <img
              src="fearing_bandz.png"
              alt="Painterly portrait of Bandz in a dark suit"
              width="1122"
              height="1402"
              fetchpriority="high"
              decoding="async"
            />
          </figure>
        </div>

        <div class="panel reveal" style="--delay: 150ms">
          <nav class="main-links" aria-label="Bandz links">
            <a
              class="link-row"
              href="https://discord.gg/XdWaEBXQ6G"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="link-preview link-preview--discord" aria-hidden="true">
                <i class="fa-brands fa-discord"></i>
              </span>
              <span class="link-copy">
                <span class="link-kicker">Free access</span>
                <span class="link-title">Discord</span>
              </span>
              <span class="link-arrow" aria-hidden="true">↗</span>
            </a>

            <a
              class="link-row"
              href="https://bandzjournal.vercel.app/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="link-preview link-preview--journal" aria-hidden="true">
                <img src="calender.png" alt="" width="3840" height="2063" decoding="async" />
              </span>
              <span class="link-copy">
                <span class="link-kicker">Free access</span>
                <span class="link-title">Trading Journal</span>
              </span>
              <span class="link-arrow" aria-hidden="true">↗</span>
            </a>

            <button
              class="link-row"
              type="button"
              id="openIndicators"
              aria-haspopup="dialog"
              aria-controls="indicatorsDialog"
            >
              <span class="link-preview link-preview--indicator" aria-hidden="true">
                <img
                  src="https://s3.tradingview.com/w/wc5MzQEq_mid.webp?v=1781555710"
                  alt=""
                  width="932"
                  height="550"
                  decoding="async"
                />
              </span>
              <span class="link-copy">
                <span class="link-kicker">Free access</span>
                <span class="link-title">Indicators</span>
              </span>
              <span class="link-arrow" aria-hidden="true">↗</span>
            </button>
          </nav>

          <section class="socials" aria-labelledby="social-title">
            <h2 class="social-label" id="social-title">Socials</h2>
            <nav class="social-links" aria-label="Bandz social media">
              <a class="social-link" href="https://x.com/Bandz_Trading" aria-label="Bandz on X" title="X">
                <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
              </a>
              <a class="social-link" href="https://www.instagram.com/bandwithsam/" aria-label="Bandz on Instagram" title="Instagram">
                <i class="fa-brands fa-instagram" aria-hidden="true"></i>
              </a>
              <a class="social-link" href="https://www.tiktok.com/@bandwithsam" aria-label="Bandz on TikTok" title="TikTok">
                <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
              </a>
              <a class="social-link" href="https://www.youtube.com/@BandzTrading" aria-label="Bandz on YouTube" title="YouTube">
                <i class="fa-brands fa-youtube" aria-hidden="true"></i>
              </a>
            </nav>
          </section>
        </div>
      </main>

      <div class="rule reveal" style="--delay: 220ms" aria-hidden="true"></div>
    </div>

    <dialog id="indicatorsDialog" aria-labelledby="indicatorsTitle">
      <div class="dialog-shell">
        <header class="dialog-header">
          <h2 class="dialog-title" id="indicatorsTitle">Indicators</h2>
          <button class="close-button" type="button" data-close-dialog aria-label="Close indicators">
            <span aria-hidden="true">×</span>
          </button>
        </header>

        <div class="dialog-body">
          <div class="indicator-grid">
            <a class="indicator-item" href="https://www.tradingview.com/script/wc5MzQEq-Bandz-Multi-Timeframe-timecycles-QT-SSMT/" target="_blank" rel="noopener noreferrer">
              <span class="indicator-image-wrap">
                <img src="https://s3.tradingview.com/w/wc5MzQEq_mid.webp?v=1781555710" alt="Multi-Timeframe Timecycles QT SSMT indicator preview" width="932" height="550" loading="lazy" decoding="async" />
              </span>
              <span class="indicator-info">
                <span class="indicator-name">Multi-Timeframe Timecycles · QT · SSMT</span>
                <span aria-hidden="true">↗</span>
              </span>
            </a>

            <a class="indicator-item" href="https://www.tradingview.com/script/Y8RDMaqx-Bandz-Multi-HTF-Candles-2-0-PSP-SMT-T-Spot-CISD/" target="_blank" rel="noopener noreferrer">
              <span class="indicator-image-wrap">
                <img src="https://s3.tradingview.com/y/Y8RDMaqx_mid.webp?v=1781556706" alt="Multi HTF Candles 2.0 indicator preview" width="932" height="550" loading="lazy" decoding="async" />
              </span>
              <span class="indicator-info">
                <span class="indicator-name">Multi HTF Candles 2.0 · PSP · SMT · T-Spot · CISD</span>
                <span aria-hidden="true">↗</span>
              </span>
            </a>

            <a class="indicator-item" href="https://www.tradingview.com/script/XIwA0v2s-Bandz-NWOG-NDOG-Macros-Watermark/" target="_blank" rel="noopener noreferrer">
              <span class="indicator-image-wrap">
                <img src="https://s3.tradingview.com/x/XIwA0v2s_mid.webp?v=1781557481" alt="NWOG NDOG Macros Watermark indicator preview" width="932" height="550" loading="lazy" decoding="async" />
              </span>
              <span class="indicator-info">
                <span class="indicator-name">NWOG · NDOG · Macros · Watermark</span>
                <span aria-hidden="true">↗</span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </dialog>

    <script>
      const indicatorsDialog = document.querySelector("#indicatorsDialog");
      const openIndicators = document.querySelector("#openIndicators");
      const closeIndicators = indicatorsDialog.querySelector("[data-close-dialog]");

      function openDialog() {
        if (!indicatorsDialog.open) {
          indicatorsDialog.showModal();
        }
        document.body.classList.add("modal-open");
      }

      function closeDialog() {
        indicatorsDialog.close();
        document.body.classList.remove("modal-open");
      }

      openIndicators.addEventListener("click", openDialog);
      closeIndicators.addEventListener("click", closeDialog);
      indicatorsDialog.addEventListener("click", (event) => {
        if (event.target === indicatorsDialog) {
          closeDialog();
        }
      });
      indicatorsDialog.addEventListener("close", () => {
        document.body.classList.remove("modal-open");
      });
    </script>
  </body>
</html>
